version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - ../src:/app/src
    environment:
      - NODE_ENV=dev
    depends_on:
      - mongodb
    networks:
      - cadna-network

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: cadna_admin
      MONGO_INITDB_ROOT_PASSWORD: cadna_secret
      MONGO_INITDB_DATABASE: cadna_mart_dev
    volumes:
      - mongodb_data:/data/db
    networks:
      - cadna-network

volumes:
  mongodb_data:

networks:
  cadna-network:
    driver: bridge
