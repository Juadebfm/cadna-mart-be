version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - ../src:/app/src
    env_file:
      - ../.env.dev
    environment:
      - MONGO_URI=mongodb://cadna_admin:cadna_secret@mongodb:27017/cadna_mart_dev?authSource=admin
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - cadna-network

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: cadna_admin
      MONGO_INITDB_ROOT_PASSWORD: cadna_secret
      MONGO_INITDB_DATABASE: cadna_mart_dev
    volumes:
      - mongodb_data:/data/db
    networks:
      - cadna-network

volumes:
  mongodb_data:

networks:
  cadna-network:
    driver: bridge
