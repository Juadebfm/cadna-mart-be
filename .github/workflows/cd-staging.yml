name: CD Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # TODO: Add deployment steps (e.g., Docker build & push, deploy to cloud)
      - name: Deploy to staging
        run: echo "Deploy to staging - configure your deployment target"
