name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test -- --coverage
        env:
          NODE_ENV: dev
          MONGO_URI: mongodb://localhost:27017/cadna_mart_test
          JWT_ACCESS_SECRET: ci-test-access-secret-min32characters
          JWT_REFRESH_SECRET: ci-test-refresh-secret-min32characters
          SESSION_SECRET: ci-test-session-secret-min32characters
