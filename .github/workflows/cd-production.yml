name: CD Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # TODO: Add deployment steps (e.g., Docker build & push, deploy to cloud)
      - name: Deploy to production
        run: echo "Deploy to production - configure your deployment target"
